<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DocuSearch</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            /* 뷰포트 고정으로 body 스크롤 방지, 헤더/사이드바 고정 후 채팅 영역만 스크롤 */
            body {
                font-family: 'Google Sans', 'Roboto', -apple-system, BlinkMacSystemFont, sans-serif;
                background: #f8f9fa;
                height: 100vh;
                min-height: 100vh;
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .header {
                flex-shrink: 0;
                min-height: 56px;
                background: #e8eaed;
                border-bottom: 1px solid #bdc1c6;
                padding: 16px 24px;
                display: flex;
                align-items: center;
                gap: 16px;
            }
            .header-title {
                color: #202124;
                font-size: 1.4em;
                font-weight: 400;
            }
            .header-logout {
                margin-left: auto;
            }
            .header-actions {
                margin-left: auto;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .btn-logout {
                padding: 6px 14px;
                background: #5f6368;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 0.875em;
                font-weight: 500;
                cursor: pointer;
            }
            .btn-logout:hover {
                background: #4a4d52;
            }
            .main-layout {
                flex: 1;
                min-height: 0;
                display: flex;
                overflow: hidden;
            }
            .sidebar {
                flex-shrink: 0;
                width: 280px;
                background: #e8eaed;
                border-right: 1px solid #bdc1c6;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            .sidebar-header {
                padding: 16px;
                border-bottom: 1px solid #bdc1c6;
            }
            .new-chat-btn {
                width: 100%;
                padding: 8px 14px;
                background: #1967d2;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 0.875em;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
            }
            .new-chat-btn:hover {
                background: #1557b0;
            }
            .history-list {
                flex: 1;
                overflow-y: auto;
                padding: 8px;
            }
            .history-item {
                padding: 12px;
                border-radius: 8px;
                cursor: pointer;
                transition: background 0.2s;
                margin-bottom: 4px;
            }
            .history-item:hover {
                background: #f1f3f4;
            }
            .history-item.active {
                background: #e8f0fe;
            }
            .history-title {
                font-size: 0.9em;
                color: #202124;
                margin-bottom: 4px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .history-meta {
                font-size: 0.75em;
                color: #5f6368;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .chat-container {
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }
            /* 대화 메시지 영역만 스크롤, 헤더/사이드바/입력창은 고정 */
            .chat-area {
                flex: 1;
                min-height: 0;
                padding: 24px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 16px;
            }
            .message-card {
                background: white;
                border-radius: 12px;
                padding: 20px 24px;
                border: 1px solid #e8eaed;
                animation: fadeIn 0.3s ease;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .message-header {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 12px;
                color: #5f6368;
                font-size: 0.85em;
                font-weight: 500;
            }
            .message-icon {
                font-size: 1em;
                width: 1.2em;
                text-align: center;
            }
            .message-content {
                color: #202124;
                font-size: 0.95em;
                line-height: 1.6;
                word-wrap: break-word;
            }
            /* 마크다운 렌더링 스타일: 제목·리스트·코드·인용구·테이블 */
            .message-content h1,
            .message-content h2,
            .message-content h3 {
                margin: 1em 0 0.5em;
                font-weight: 600;
            }
            .message-content h1 {
                font-size: 1.35em;
            }
            .message-content h2 {
                font-size: 1.2em;
            }
            .message-content h3 {
                font-size: 1.05em;
            }
            .message-content p {
                margin: 0.5em 0;
            }
            .message-content ul,
            .message-content ol {
                margin: 0.5em 0;
                padding-left: 1.5em;
            }
            .message-content li {
                margin: 0.25em 0;
            }
            .message-content pre {
                margin: 0.75em 0;
                padding: 12px;
                background: #f1f3f4;
                border-radius: 8px;
                overflow-x: auto;
            }
            .message-content code {
                background: #f1f3f4;
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 0.9em;
            }
            .message-content pre code {
                background: none;
                padding: 0;
            }
            .message-content blockquote {
                margin: 0.5em 0;
                padding-left: 1em;
                border-left: 4px solid #dadce0;
                color: #5f6368;
            }
            .message-content table {
                border-collapse: collapse;
                margin: 0.75em 0;
                width: 100%;
            }
            .message-content th,
            .message-content td {
                border: 1px solid #e8eaed;
                padding: 8px 12px;
                text-align: left;
            }
            .message-content th {
                background: #f8f9fa;
                font-weight: 600;
            }
            .message-content a {
                color: #1967d2;
                text-decoration: none;
            }
            .message-content a:hover {
                text-decoration: underline;
            }
            .user-message {
                border-left: 3px solid #1967d2;
            }
            .ai-message {
                border-left: 3px solid #34a853;
            }
            .error-message {
                border-left: 3px solid #ea4335;
            }
            .error-message .message-content {
                color: #d93025;
            }
            .loading-message {
                border-left: 3px solid #fbbc04;
            }
            .loading-dots {
                display: inline-flex;
                gap: 4px;
                margin-left: 4px;
            }
            .loading-dots span {
                width: 6px;
                height: 6px;
                background: #5f6368;
                border-radius: 50%;
                animation: bounce 1.4s infinite ease-in-out both;
            }
            .loading-dots span:nth-child(1) {
                animation-delay: -0.32s;
            }
            .loading-dots span:nth-child(2) {
                animation-delay: -0.16s;
            }
            @keyframes bounce {
                0%,
                80%,
                100% {
                    transform: scale(0);
                }
                40% {
                    transform: scale(1);
                }
            }
            .placeholder {
                text-align: center;
                padding: 80px 20px;
                color: #5f6368;
                margin: auto;
            }
            .placeholder-icon {
                font-size: 3.5em;
                margin-bottom: 16px;
                opacity: 0.4;
                color: #5f6368;
            }
            .placeholder-text {
                font-size: 1.1em;
            }
            .input-area {
                flex-shrink: 0;
                background: white;
                border-top: 1px solid #e8eaed;
                padding: 16px 24px;
            }
            form {
                display: flex;
                gap: 12px;
                align-items: flex-end;
            }
            textarea {
                flex: 1;
                padding: 12px 16px;
                border: 1px solid #dadce0;
                border-radius: 8px;
                font-size: 0.95em;
                font-family: inherit;
                resize: vertical;
                min-height: 52px;
                max-height: 200px;
                transition: border-color 0.2s;
            }
            textarea:focus {
                outline: none;
                border-color: #1967d2;
            }
            textarea:disabled {
                background: #f8f9fa;
                cursor: not-allowed;
            }
            .btn {
                height: 52px;
                padding: 0 20px;
                background: #1967d2;
                color: white;
                border: none;
                border-radius: 6px;
                font-size: 0.875em;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.2s;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }
            .btn:hover:not(:disabled) {
                background: #1557b0;
            }
            .btn:active:not(:disabled) {
                background: #174ea6;
            }
            .btn:disabled {
                background: #dadce0;
                cursor: not-allowed;
            }
            .empty-history {
                text-align: center;
                padding: 40px 20px;
                color: #5f6368;
                font-size: 0.9em;
            }
            /* 히스토리 아이템 호버 시 삭제 버튼 표시 */
            .history-item {
                position: relative;
            }
            .history-delete-btn {
                position: absolute;
                top: 50%;
                right: 8px;
                transform: translateY(-50%);
                display: none;
                background: none;
                border: none;
                cursor: pointer;
                color: #9aa0a6;
                padding: 4px 6px;
                border-radius: 4px;
                font-size: 0.85em;
                line-height: 1;
                flex-shrink: 0;
            }
            .history-delete-btn:hover {
                background: #fce8e6;
                color: #d93025;
            }
            .history-item:hover .history-delete-btn {
                display: block;
            }
            /* 삭제 버튼 표시 공간 확보 */
            .history-item:hover .history-title {
                padding-right: 24px;
            }
            @media (max-width: 768px) {
                .sidebar {
                    position: fixed;
                    left: -280px;
                    top: 0;
                    bottom: 0;
                    z-index: 1000;
                    transition: left 0.3s;
                }
                .sidebar.open {
                    left: 0;
                }
            }
        </style>
    </head>
    <body>
        <div class="header">
            <div class="header-title">AI Chat</div>
            <div class="header-actions">
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn-logout">로그아웃</button>
                </form>
            </div>
        </div>

        <div class="main-layout">
            <!-- 사이드바 -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <button class="new-chat-btn" id="newChatBtn">
                        <i class="fa-solid fa-plus"></i>
                        <span>새 대화</span>
                    </button>
                    <div style="height: 10px"></div>
                    <a
                        href="/rag/documents"
                        class="new-chat-btn"
                        style="background: #34a853; text-decoration: none">
                        <i class="fa-solid fa-book-open"></i>
                        <span>문서 관리</span>
                    </a>
                </div>
                <div class="history-list" id="historyList">
                    <div class="empty-history">히스토리를 불러오는 중...</div>
                </div>
            </div>

            <!-- 메인 채팅 영역 -->
            <div class="chat-container">
                <div class="chat-area" id="chatArea">
                    <div class="placeholder" id="placeholder">
                        <div class="placeholder-icon"><i class="fa-regular fa-comments"></i></div>
                        <div class="placeholder-text">
                            왼쪽에서 대화를 선택하거나 새 대화를 시작하세요
                        </div>
                    </div>
                </div>

                <div class="input-area">
                    <form id="chatForm">
                        <textarea
                            id="messageInput"
                            name="message"
                            placeholder="메시지를 입력하세요..."
                            required
                            rows="1"></textarea>
                        <button type="submit" class="btn" id="sendButton">전송</button>
                    </form>
                </div>
            </div>
        </div>

        <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}" />
        <!-- 마크다운 렌더링: marked(파싱) + DOMPurify(XSS 방지) -->
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
        <script>
            const chatArea = document.getElementById('chatArea');
            const chatForm = document.getElementById('chatForm');
            const messageInput = document.getElementById('messageInput');
            const sendButton = document.getElementById('sendButton');
            const placeholder = document.getElementById('placeholder');
            const historyList = document.getElementById('historyList');
            const newChatBtn = document.getElementById('newChatBtn');

            // Conversation ID 관리 — 초기화 완료 전까지 null 유지 (구 사용자 ID 오염 방지)
            let conversationId = null;

            // 히스토리 목록 로드
            async function fetchHistories() {
                const response = await fetch('/api/chat/histories');
                if (!response.ok) {
                    throw new Error(`히스토리 조회 실패 (${response.status})`);
                }
                return response.json();
            }

            function renderHistories(histories) {
                if (!Array.isArray(histories) || histories.length === 0) {
                    historyList.innerHTML =
                        '<div class="empty-history">대화 히스토리가 없습니다</div>';
                    return;
                }

                historyList.innerHTML = '';
                histories.forEach((history) => {
                    const item = document.createElement('div');
                    item.className = 'history-item';
                    if (history.conversationId === conversationId) {
                        item.classList.add('active');
                    }

                    const title = document.createElement('div');
                    title.className = 'history-title';
                    title.textContent = history.title;

                    const meta = document.createElement('div');
                    meta.className = 'history-meta';
                    const date = new Date(history.lastUpdated);
                    meta.innerHTML = `<span>${formatDate(date)}</span>`;

                    // 삭제 버튼 (호버 시 노출)
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'history-delete-btn';
                    deleteBtn.title = '대화 삭제';
                    deleteBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteHistory(history.conversationId);
                    });

                    item.appendChild(title);
                    item.appendChild(meta);
                    item.appendChild(deleteBtn);

                    item.addEventListener('click', (e) => {
                        selectHistory(history.conversationId, e.currentTarget);
                    });

                    historyList.appendChild(item);
                });
            }

            async function loadHistories() {
                try {
                    const histories = await fetchHistories();
                    renderHistories(histories);
                    return histories;
                } catch (error) {
                    console.error('히스토리 로드 실패:', error);
                    historyList.innerHTML = '<div class="empty-history">히스토리 로드 실패</div>';
                    return [];
                }
            }

            // 날짜 포맷팅
            function formatDate(date) {
                const now = new Date();
                const diff = now - date;
                const minutes = Math.floor(diff / 60000);
                const hours = Math.floor(diff / 3600000);
                const days = Math.floor(diff / 86400000);

                if (minutes < 1) return '방금 전';
                if (minutes < 60) return `${minutes}분 전`;
                if (hours < 24) return `${hours}시간 전`;
                if (days < 7) return `${days}일 전`;
                return date.toLocaleDateString('ko-KR');
            }

            /** 대화 삭제: 서버 DELETE 호출 후 현재 대화면 초기화, 목록 새로고침 */
            async function deleteHistory(id) {
                if (!confirm('이 대화를 삭제할까요?')) return;
                try {
                    const res = await fetch(`/api/chat/histories/${encodeURIComponent(id)}`, {
                        method: 'DELETE',
                    });
                    if (!res.ok && res.status !== 204) {
                        const text = await res.text();
                        throw new Error(`삭제 실패 (${res.status}): ${text || res.statusText}`);
                    }
                    // 삭제된 대화가 현재 활성 대화이면 채팅 영역 초기화
                    if (id === conversationId) {
                        conversationId = crypto.randomUUID();
                        localStorage.setItem('conversationId', conversationId);
                        chatArea.innerHTML = '';
                        const ph = document.createElement('div');
                        ph.className = 'placeholder';
                        ph.id = 'placeholder';
                        ph.innerHTML = `
                            <div class="placeholder-icon"><i class="fa-regular fa-comments"></i></div>
                            <div class="placeholder-text">왼쪽에서 대화를 선택하거나 새 대화를 시작하세요</div>
                        `;
                        chatArea.appendChild(ph);
                    }
                    await loadHistories();
                } catch (e) {
                    alert(e.message);
                }
            }

            // 히스토리 선택
            async function selectHistory(id, clickedElement) {
                conversationId = id;
                localStorage.setItem('conversationId', conversationId);

                // 활성 상태 업데이트
                document.querySelectorAll('.history-item').forEach((item) => {
                    item.classList.remove('active');
                });
                if (clickedElement) {
                    clickedElement.classList.add('active');
                }

                // 대화 내용 로드
                await loadHistoryMessages(id);

                // 히스토리 목록 새로고침
                await loadHistories();
            }

            // 특정 히스토리의 메시지 로드
            async function loadHistoryMessages(id) {
                try {
                    const response = await fetch(`/api/chat/histories/${id}`);
                    const historyDetail = await response.json();

                    // 채팅 영역 초기화
                    chatArea.innerHTML = '';
                    if (placeholder) placeholder.remove();

                    // 메시지 표시
                    historyDetail.messages.forEach((msg) => {
                        const type = msg.role === 'user' ? 'user' : 'ai';
                        addMessage(msg.content, type, false);
                    });

                    // 스크롤 하단으로
                    chatArea.scrollTop = chatArea.scrollHeight;
                } catch (error) {
                    console.error('메시지 로드 실패:', error);
                    addMessage('대화 내용을 불러오는 중 오류가 발생했습니다.', 'error');
                }
            }

            // 새 대화 시작
            newChatBtn.addEventListener('click', () => {
                conversationId = crypto.randomUUID();
                localStorage.setItem('conversationId', conversationId);

                // 채팅 영역 초기화
                chatArea.innerHTML = '';
                const newPlaceholder = document.createElement('div');
                newPlaceholder.className = 'placeholder';
                newPlaceholder.id = 'placeholder';
                newPlaceholder.innerHTML = `
                <div class="placeholder-icon"><i class="fa-regular fa-comments"></i></div>
                <div class="placeholder-text">새 대화를 시작하세요</div>
            `;
                chatArea.appendChild(newPlaceholder);

                // 히스토리 목록 새로고침
                loadHistories();
            });

            // 자동 높이 조절
            messageInput.addEventListener('input', function () {
                this.style.height = 'auto';
                this.style.height = Math.min(this.scrollHeight, 200) + 'px';
            });

            // 메시지 추가 함수
            function addMessage(content, type, scroll = true) {
                // placeholder 제거
                const existingPlaceholder = document.getElementById('placeholder');
                if (existingPlaceholder) {
                    existingPlaceholder.remove();
                }

                const messageCard = document.createElement('div');
                messageCard.className = `message-card ${type}-message`;

                const header = document.createElement('div');
                header.className = 'message-header';

                const icon = document.createElement('span');
                icon.className = 'message-icon';

                const label = document.createElement('span');

                if (type === 'user') {
                    icon.innerHTML = '<i class="fa-solid fa-user"></i>';
                    label.textContent = 'You';
                } else if (type === 'ai') {
                    icon.innerHTML = '<i class="fa-solid fa-robot"></i>';
                    label.textContent = 'AI';
                } else if (type === 'error') {
                    icon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
                    label.textContent = 'Error';
                } else if (type === 'loading') {
                    icon.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                    label.textContent = 'AI';
                }

                header.appendChild(icon);
                header.appendChild(label);

                const messageContent = document.createElement('div');
                messageContent.className = 'message-content';

                if (type === 'loading') {
                    messageContent.innerHTML =
                        'Thinking<span class="loading-dots"><span></span><span></span><span></span></span>';
                } else if (type === 'error') {
                    messageContent.textContent = content;
                } else {
                    // user·ai 메시지: 마크다운 → HTML 변환 후 DOMPurify로 sanitize
                    const rawHtml =
                        typeof marked !== 'undefined'
                            ? marked.parse(content || '')
                            : (content || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    messageContent.innerHTML =
                        typeof DOMPurify !== 'undefined' ? DOMPurify.sanitize(rawHtml) : rawHtml;
                }

                messageCard.appendChild(header);
                messageCard.appendChild(messageContent);
                chatArea.appendChild(messageCard);

                // 스크롤 하단으로
                if (scroll) {
                    chatArea.scrollTop = chatArea.scrollHeight;
                }

                return messageCard;
            }

            // 폼 제출 처리
            chatForm.addEventListener('submit', async function (e) {
                e.preventDefault();

                const message = messageInput.value.trim();
                if (!message) return;

                // 사용자 메시지 추가
                addMessage(message, 'user');

                // 입력창 초기화 및 비활성화
                messageInput.value = '';
                messageInput.style.height = 'auto';
                messageInput.disabled = true;
                sendButton.disabled = true;

                // 로딩 메시지 추가
                const loadingCard = addMessage('', 'loading');

                try {
                    // 서버로 메시지 전송 (conversationId 포함)
                    const response = await fetch('/api/chat/message', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: message,
                            conversationId: conversationId,
                        }),
                    });

                    const data = await response.json();

                    // 로딩 메시지 제거
                    loadingCard.remove();

                    if (data.success === 'true') {
                        // 서버가 반환한 conversationId로 동기화 (다른 사용자 ID 충돌 시 서버가 새 ID를 발급)
                        if (data.conversationId && data.conversationId !== conversationId) {
                            conversationId = data.conversationId;
                            localStorage.setItem('conversationId', conversationId);
                        }
                        // AI 응답 추가
                        addMessage(data.response, 'ai');
                        // 히스토리 목록 새로고침
                        loadHistories();
                    } else {
                        // 에러 메시지 추가
                        addMessage('AI 응답 중 오류가 발생했습니다: ' + data.error, 'error');
                    }
                } catch (error) {
                    // 로딩 메시지 제거
                    loadingCard.remove();
                    // 에러 메시지 추가
                    addMessage('네트워크 오류가 발생했습니다: ' + error.message, 'error');
                } finally {
                    // 입력창 활성화
                    messageInput.disabled = false;
                    sendButton.disabled = false;
                    messageInput.focus();
                }
            });

            // Enter 키로 전송 (Shift+Enter는 줄바꿈)
            messageInput.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    chatForm.dispatchEvent(new Event('submit'));
                }
            });

            // 페이지 초기화: 서버 히스토리 기준으로 conversationId 결정
            // localStorage의 ID가 현재 사용자 히스토리에 없으면 새 UUID를 발급한다.
            async function initializeChatPage() {
                const histories = await loadHistories();

                if (!Array.isArray(histories) || histories.length === 0) {
                    conversationId = crypto.randomUUID();
                    localStorage.setItem('conversationId', conversationId);
                    return;
                }

                const storedConversationId = localStorage.getItem('conversationId');
                const hasStoredConversation = histories.some(
                    (h) => h.conversationId === storedConversationId,
                );

                if (hasStoredConversation) {
                    conversationId = storedConversationId;
                } else {
                    // localStorage의 ID가 현재 사용자 것이 아니면 최신 대화로 교체
                    conversationId = histories[0].conversationId;
                }
                localStorage.setItem('conversationId', conversationId);

                renderHistories(histories);
                await loadHistoryMessages(conversationId);
            }

            initializeChatPage().catch((error) => {
                console.error('초기화 실패:', error);
            });

        </script>
    </body>
</html>
