# local/staging 공통: HTTPS 기본 포트 8080 (인증서·키는 classpath:ssl/ 포함)
server:
  port: 8080
  ssl:
    certificate: classpath:ssl/cert.pem
    certificate-private-key: classpath:ssl/key.pem

app:
  mail:
    enabled: true
    from: no-reply@spring-ai.local

spring:
  application:
    name: spring-ai
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 3000
      "[mail.smtp.writetimeout]": 5000
  web:
    resources:
      static-locations: classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/,file:src/main/resources/static/
  servlet:
    multipart:
      max-file-size: 10MB   # 단일 파일 최대 10MB
      max-request-size: 100MB   # 요청 본문 전체 최대 100MB
  datasource:
    url: jdbc:postgresql://10.253.12.78:25434/spring_ai
    username: spring_ai
    password: inno1234!
    driver-class-name: org.postgresql.Driver
  ai:
    google:
      genai:
        project-id: test-pj-484705
        api-key: ${GEMINI_API_KEY}
        embedding:
          api-key: ${GEMINI_API_KEY}
          text:
            options:
              # Gemini API (API key) supports gemini-embedding-001 only; text-embedding-004 is not available on v1beta
              model: gemini-embedding-001
              dimensions: 768
        chat:
          options:
            model: gemini-3.1-flash-lite-preview
            temperature: 0.2
            top-k: 15
    model:
      embedding:
        text: google-genai
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always # PostgreSQL에 스키마 자동 생성
  output:
    ansi:
      enabled: always
  jpa:
    hibernate:
      # 애플리케이션 엔티티만 Hibernate가 DDL 관리(채팅 메모리 테이블은 JPA 매핑 제거) // 개발 편의용
      ddl-auto: update
    show-sql: true
